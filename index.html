<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Referral On-Call</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f6fb;
      padding:20px;
      max-width:700px;
      margin:auto;
      color:#1f2937;
    }
    .section{
      background:white;
      padding:18px;
      border-radius:14px;
      box-shadow:0 2px 8px rgba(0,0,0,0.08);
      margin-bottom:18px;
    }
    input, button{
      width:100%;
      padding:14px;
      margin-top:10px;
      border-radius:10px;
      border:1px solid #cbd5e1;
      font-size:16px;
      box-sizing:border-box;
    }
    button{
      background:#2f3f86;
      color:white;
      border:none;
      font-weight:bold;
      cursor:pointer;
    }
    .secondary{ background:#64748b; }
    .card{
      background:white;
      padding:14px;
      margin-top:10px;
      border-radius:12px;
      box-shadow:0 2px 8px rgba(0,0,0,0.08);
    }
    #msg{
      margin-bottom:15px;
      font-weight:bold;
    }
  </style>
</head>
<body>

<h1>Referral On-Call</h1>
<div id="msg"></div>

<div class="section">
  <h2>Login</h2>
  <input id="loginEmail" type="email" placeholder="Email">
  <input id="loginPassword" type="password" placeholder="Password">
  <button id="loginBtn">Login</button>
  <button id="logoutBtn" class="secondary">Logout</button>
</div>

<div class="section">
  <h2>Book 24h Shift (08 → 08)</h2>
  <input id="date" type="date">
  <button id="bookBtn">Book Shift</button>
</div>

<div class="section">
  <h2>All Bookings</h2>
  <div id="list"></div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://xhdsufvhwyuhrffxigsn.supabase.co",
  "sb_publishable_keJ0wHjG_8TjLz_8dGClIQ_kWG7Il2K"
);

let currentUser = null;

function msg(text, ok = true){
  const el = document.getElementById("msg");
  el.style.color = ok ? "green" : "red";
  el.innerText = text;
}

function esc(text){
  return String(text || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

async function loadBookings(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  const { data: bookings, error: bErr } = await supabase
    .from("referral_bookings")
    .select("id, doctor_id, shift_date")
    .order("shift_date", { ascending: true });

  if(bErr){
    msg("Load bookings failed: " + bErr.message, false);
    return;
  }

  if(!bookings || bookings.length === 0){
    list.innerHTML = "<p>No bookings yet.</p>";
    return;
  }

  const ids = [...new Set(bookings.map(x => x.doctor_id).filter(Boolean))];

  const { data: profiles, error: pErr } = await supabase
    .from("profiles")
    .select("id, name, email")
    .in("id", ids);

  if(pErr){
    msg("Load profiles failed: " + pErr.message, false);
    return;
  }

  const map = {};
  (profiles || []).forEach(p => map[p.id] = p);

  bookings.forEach(item => {
    const profile = map[item.doctor_id];
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <b>${esc(item.shift_date)}</b><br>
      Doctor: ${esc(profile?.name || "Unknown")}
    `;
    list.appendChild(div);
  });
}

document.getElementById("loginBtn").addEventListener("click", async () => {
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });

  if(error){
    alert(error.message);
    msg(error.message, false);
    return;
  }

  currentUser = data.user;
  alert("Logged in");
  msg("Logged in");
  await loadBookings();
});

document.getElementById("logoutBtn").addEventListener("click", async () => {
  const { error } = await supabase.auth.signOut();
  if(error){
    alert(error.message);
    msg(error.message, false);
    return;
  }
  currentUser = null;
  msg("Logged out");
});

document.getElementById("bookBtn").addEventListener("click", async () => {
  if(!currentUser){
    alert("Login first");
    msg("Login first", false);
    return;
  }

  const date = document.getElementById("date").value;
  if(!date){
    alert("Select date");
    return;
  }

  const { error } = await supabase
    .from("referral_bookings")
    .insert({
      doctor_id: currentUser.id,
      shift_date: date
    });

  if(error){
    alert(error.message);
    msg(error.message, false);
    return;
  }

  alert("Booked");
  msg("Booked");
  await loadBookings();
});

loadBookings();
</script>
</body>
</html>
