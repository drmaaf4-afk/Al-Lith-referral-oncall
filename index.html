<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Referral Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f6fb;
      padding:20px;
      max-width:700px;
      margin:auto;
      color:#1f2937;
    }
    .section{
      background:white;
      padding:18px;
      border-radius:14px;
      box-shadow:0 2px 8px rgba(0,0,0,0.08);
      margin-bottom:18px;
    }
    input, button{
      width:100%;
      padding:14px;
      margin-top:10px;
      border-radius:10px;
      border:1px solid #cbd5e1;
      font-size:16px;
      box-sizing:border-box;
    }
    button{
      background:#2f3f86;
      color:white;
      border:none;
      font-weight:bold;
      cursor:pointer;
    }
    #status{
      font-weight:bold;
      margin-bottom:16px;
    }
  </style>
</head>
<body>
  <h1>Referral Test</h1>
  <div id="status">Loading...</div>

  <div class="section">
    <input type="text" id="testName" placeholder="Name">
    <button onclick="testClick()">Test Button</button>
    <button onclick="testSignup()">Test Signup Alert</button>
  </div>

  <script>
    let supabase = null;

    try {
      supabase = window.supabase.createClient(
        "https://xhdsufvhwyuhrffxigsn.supabase.co",
        "sb_publishable_keJ0wHjG_8TjLz_8dGClIQ_kWG7Il2K"
      );
      document.getElementById("status").innerText = "JS loaded successfully";
    } catch (e) {
      document.getElementById("status").innerText = "JS error: " + e.message;
      alert("JS error: " + e.message);
    }

    function testClick(){
      alert("Button click works");
    }

    async function testSignup(){
      alert("Signup function started");
      console.log("Signup function started");
    }
  </script>
</body>
</html>
