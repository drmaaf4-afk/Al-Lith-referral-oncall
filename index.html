<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JS Test</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f6fb;
      padding:20px;
      max-width:700px;
      margin:auto;
      color:#1f2937;
    }
    .section{
      background:white;
      padding:18px;
      border-radius:14px;
      box-shadow:0 2px 8px rgba(0,0,0,0.08);
      margin-bottom:18px;
    }
    button{
      width:100%;
      padding:14px;
      margin-top:10px;
      border-radius:10px;
      border:none;
      font-size:16px;
      box-sizing:border-box;
      background:#2f3f86;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>
<body>
  <h1>Pure JS Test</h1>
  <div id="status">Loading...</div>

  <div class="section">
    <button id="btn1">Button 1</button>
    <button id="btn2">Button 2</button>
  </div>

  <script>
    document.getElementById("status").textContent = "JavaScript is running";

    document.getElementById("btn1").addEventListener("click", function () {
      alert("Button 1 works");
    });

    document.getElementById("btn2").addEventListener("click", function () {
      alert("Button 2 works");
    });
  </script>
</body>
</html>
