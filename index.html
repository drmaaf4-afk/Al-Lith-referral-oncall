<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    body{font-family:Arial,sans-serif;background:#f4f6fb;padding:20px;max-width:700px;margin:auto;color:#1f2937}
    .box{background:#fff;padding:18px;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
    input,button{width:100%;padding:14px;margin-top:10px;border-radius:10px;border:1px solid #cbd5e1;font-size:16px;box-sizing:border-box}
    button{background:#2f3f86;color:#fff;border:none;font-weight:bold}
    #msg{margin:16px 0;font-weight:bold;white-space:pre-wrap}
  </style>
</head>
<body>
  <h1>Login Test</h1>
  <div id="msg">Page loaded</div>

  <div class="box">
    <input id="email" type="email" placeholder="Email" value="drmaaf2008@yahoo.com">
    <input id="password" type="password" placeholder="Password">
    <button id="loginBtn">Login</button>
  </div>

  <script>
    const supabase = window.supabase.createClient(
      "https://xhdsufvhwyuhrffxigsn.supabase.co",
      "sb_publishable_keJ0wHjG_8TjLz_8dGClIQ_kWG7Il2K"
    );

    function setMsg(text, ok=true){
      const el = document.getElementById("msg");
      el.style.color = ok ? "green" : "red";
      el.textContent = text;
    }

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      setMsg("Trying login...");

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        setMsg("LOGIN ERROR:\n" + error.message, false);
        return;
      }

      setMsg("LOGIN OK\nUser ID:\n" + data.user.id);

      const { data: profile, error: pErr } = await supabase
        .from("profiles")
        .select("id,name,email")
        .eq("id", data.user.id)
        .single();

      if (pErr) {
        setMsg("LOGIN OK\nBut profile lookup failed:\n" + pErr.message, false);
        return;
      }

      setMsg("LOGIN OK\nName: " + profile.name + "\nEmail: " + profile.email);
    });
  </script>
</body>
</html>
